---
# Ref: https://github.com/actions/labeler/tree/main#pull-request-labeler

core:
  - changed-files:
      - any-glob-to-any-file:
          - "src/**/*.rs"
          - "Cargo.toml"
          - "Cargo.lock"
          - "rust-toolchain.toml"
          - ".clippy.toml"
          - "ast-rules/**"

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "tests/**"

github-actions:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/actions/**"
          - ".github/actionlint.yaml"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "README.md"
          - "**/*.md"

renovate:
  - changed-files:
      - any-glob-to-any-file: "renovate.json"

# Branch pattern
develop:
  - head-branch: ["^dev/"]
