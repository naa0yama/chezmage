# Jaeger v2 all-in-one configuration
# Receives OTLP over HTTP (:4318), serves UI on :16687
# Start: mise run jaeger
# Stop:  mise run jaeger:stop

service:
  extensions: [healthcheckv2]
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [jaeger_storage_exporter]

extensions:
  healthcheckv2:
    http:
      endpoint: 0.0.0.0:13133
  jaeger_storage:
    backends:
      memstore:
        memory:
          max_traces: 50000
  jaeger_query:
    storage:
      traces: memstore
    http:
      endpoint: 0.0.0.0:16687
    grpc:
      endpoint: 0.0.0.0:16686

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

exporters:
  jaeger_storage_exporter:
    trace_storage: memstore
